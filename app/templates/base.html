<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}The Chocolate Factory{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">🍫 The Chocolate Factory</a>
      <div class="d-flex align-items-center gap-3">
        <a class="text-white text-decoration-none" href="/">Stock</a>
        <a class="text-white text-decoration-none d-flex align-items-center gap-1" href="/orders">
          Orders
          <span id="draft-badge" class="badge bg-warning text-dark" style="display:none!important"></span>
        </a>
      </div>
    </div>
  </nav>
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('/api/stats').then(r => r.json()).then(d => {
      if (d.draft_count > 0) {
        const b = document.getElementById('draft-badge');
        b.textContent = d.draft_count;
        b.style.removeProperty('display');
      }
    });
  </script>
</body>
</html>
